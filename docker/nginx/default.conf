# ============================================================
#  Nginx — Configuration médiathèque
# ============================================================

server {
    listen 80;
    server_name localhost;
    root /var/www/html/public;
    index index.php index.html;

    # --- Charset ---
    charset utf-8;

    # --- Logs ---
    access_log /var/log/nginx/mediatheque_access.log;
    error_log  /var/log/nginx/mediatheque_error.log;

    # --- Fichiers statiques (images, CSS, JS) ---
    location ~* \.(css|js|jpg|jpeg|png|gif|webp|svg|ico|woff|woff2|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # --- Routage principal (front controller PHP) ---
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # --- PHP-FPM ---
    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;

        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_read_timeout 120;
    }

    # --- Streaming vidéo (range requests pour lecture partielle) ---
    location /stream/ {
        internal;
        alias /media/;
        add_header Accept-Ranges bytes;

        # Types MIME vidéo
        types {
            video/mp4  mp4;
            video/x-matroska mkv;
            video/webm webm;
        }
    }

    # --- Sécurité : bloquer l'accès aux fichiers sensibles ---
    location ~ /\. {
        deny all;
    }

    location ~ \.(env|sql|log|sh|md)$ {
        deny all;
    }

    # --- Taille max upload ---
    client_max_body_size 32M;
}
