# ============================================================
#  HOSHIMI (星見) — Docker Compose
#  Services : Nginx + PHP-FPM
#  Médias : Animes uniquement (Y:\Animes)
# ============================================================

services:

  # --- Serveur Web Nginx ---
  nginx:
    image: nginx:1.25-alpine
    container_name: hoshimi_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - animes_data:/media/animes
      - films_data:/media/films
      - series_data:/media/series
      - ./src/public/images:/var/www/html/public/images
    networks:
      - hoshimi_net

  # --- Cron — génération automatique des thumbnails ---
  thumbnail-cron:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: hoshimi_cron
    user: "1000:1000"
    restart: unless-stopped
    volumes:
      - ./src:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
      - animes_data:/media/animes
      - films_data:/media/films
      - series_data:/media/series
      - ./src/public/images:/var/www/html/public/images
    environment:
      - ANIMES_PATH=${ANIMES_PATH}
      - FILMS_PATH=${FILMS_PATH}
      - SERIES_PATH=${SERIES_PATH}
      - IMAGES_PATH=${IMAGES_PATH}
    command: >
      sh -c "
        php /var/www/html/cli/generate-thumbnails.php &&
        while true; do
          sleep 3600 &&
          php /var/www/html/cli/generate-thumbnails.php;
        done
      "
    networks:
      - hoshimi_net

  # --- PHP-FPM ---
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: hoshimi_php
    user: "1000:1000"
    restart: unless-stopped
    volumes:
      - ./src:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
      - animes_data:/media/animes
      - films_data:/media/films
      - series_data:/media/series
      - ./src/public/images:/var/www/html/public/images
    environment:
      - APP_ENV=${APP_ENV}
      - APP_DEBUG=${APP_DEBUG}
      - APP_NAME=${APP_NAME}
      - ANILIST_API_URL=${ANILIST_API_URL}
      - ANIMES_PATH=${ANIMES_PATH}
      - FILMS_PATH=${FILMS_PATH}
      - SERIES_PATH=${SERIES_PATH}
      - IMAGES_PATH=${IMAGES_PATH}
    networks:
      - hoshimi_net

# ============================================================
#  VOLUMES
# ============================================================
volumes:

  # Y:\Animes → /media/animes dans le container
  animes_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: "Y:\\Animes"

  # D:\Films → /media/films dans le container
  films_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: "Y:\\Films"

  # D:\Series → /media/series dans le container
  series_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: "Y:\\Series"

# ============================================================
#  RÉSEAU
# ============================================================
networks:
  hoshimi_net:
    driver: bridge